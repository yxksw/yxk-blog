name: Sponsor PR Automation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PAT: ${{ secrets.PAT }}

concurrency:
  group: sponsor-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Label and validate sponsor PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const pull_number = context.payload.pull_request.number

            const LABEL_SPONSOR = '赞助'
            const LABEL_AVATAR_OK = '头像可达'
            const LABEL_AVATAR_BAD = '头像不可达'
            const LABEL_ALL_OK = '验证通过'

            const MSG = {
              PR_ONE_FILE: 'PR 必须仅包含一个文件变更（src/data/sponsors.json）。',
              PR_PATH_ERROR: '只允许更改 src/data/sponsors.json 文件。',
              PR_ACTION_ERROR: '只允许新增、编辑或删除文件。',
              JSON_PARSE_ERROR: 'JSON 解析失败',
              JSON_ARRAY_ERROR: 'sponsors.json 必须是一个数组',
              VALIDATE_FAIL: '数据校验失败：',
              AVATAR_UNREACHABLE: '头像链接不可达，请检查链接是否有效。',
              MERGE_SUCCESS: '✅ 赞助信息已自动合并，感谢你的支持！',
              MERGE_FAIL: '❌ 自动合并失败：',
            }

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name })
              } catch (e) {
                if (e.status !== 404) throw e
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: 'ededed',
                })
              }
            }

            async function createComment(body) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              const footer = `\n\n---\n该评论由 Action 自动化发送，无需回复。\n\n🔗 [查看 Action](${runUrl})`
              const fullBody = body + footer
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body: fullBody })
            }

            async function listAllFiles() {
              const files = []
              for await (const res of github.paginate.iterator(
                github.rest.pulls.listFiles,
                { owner, repo, pull_number, per_page: 100 }
              )) {
                for (const f of res.data) files.push(f)
              }
              return files
            }

            async function getTextFileFromRepo(path, ref) {
              const res = await github.rest.repos.getContent({ owner, repo, path, ref })
              if (Array.isArray(res.data) || !res.data?.content) throw new Error(`Invalid content response for ${path}`)
              const raw = Buffer.from(res.data.content, res.data.encoding || 'base64').toString('utf8')
              return raw
            }

            async function checkAvatarReachability(url) {
              const controller = new AbortController()
              const timer = setTimeout(() => controller.abort(), 10000)
              try {
                // SSRF Protection
                try {
                  const u = new URL(url)
                  if (u.protocol !== 'http:' && u.protocol !== 'https:') throw new Error('Invalid protocol')
                  const h = u.hostname
                  if (h === 'localhost' || h === '127.0.0.1' || h === '::1') throw new Error('Localhost not allowed')
                  if (/^10\./.test(h)) throw new Error('Private IP not allowed')
                  if (/^192\.168\./.test(h)) throw new Error('Private IP not allowed')
                  if (/^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(h)) throw new Error('Private IP not allowed')
                } catch (e) {
                  return { ok: false, error: e.message }
                }

                const res = await fetch(url, {
                  method: 'HEAD',
                  redirect: 'follow',
                  headers: {
                    'user-agent': 'yxk-blog-sponsor/1.0 (+github actions)',
                    accept: 'image/*,*/*;q=0.8',
                  },
                  signal: controller.signal,
                })
                return { ok: res.status >= 200 && res.status < 400, status: res.status }
              } catch (e) {
                return { ok: false, error: e?.message || String(e) }
              } finally {
                clearTimeout(timer)
              }
            }

            // Ensure labels exist
            for (const name of [LABEL_SPONSOR, LABEL_AVATAR_OK, LABEL_AVATAR_BAD, LABEL_ALL_OK]) {
              await ensureLabel(name)
            }

            const files = await listAllFiles()

            // Check file constraints
            if (files.length !== 1) {
              await createComment(MSG.PR_ONE_FILE)
              return
            }

            const file = files[0]
            if (file.filename !== 'src/data/sponsors.json') {
              await createComment(MSG.PR_PATH_ERROR)
              return
            }

            if (file.status !== 'added' && file.status !== 'modified' && file.status !== 'removed') {
              await createComment(MSG.PR_ACTION_ERROR)
              return
            }

            // Add sponsor label
            await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: [LABEL_SPONSOR] })

            // Skip validation for removal
            if (file.status === 'removed') {
              await github.rest.pulls.merge({ owner, repo, pull_number, merge_method: 'squash' })
              return
            }

            // Parse JSON
            const headSha = context.payload.pull_request.head.sha
            let raw
            try {
              raw = await getTextFileFromRepo(file.filename, headSha)
            } catch (e) {
              await createComment(`无法读取文件：${e.message}`)
              return
            }

            let sponsors
            try {
              sponsors = JSON.parse(raw)
            } catch (e) {
              await createComment(`${MSG.JSON_PARSE_ERROR}：${e.message}`)
              return
            }

            if (!Array.isArray(sponsors)) {
              await createComment(MSG.JSON_ARRAY_ERROR)
              return
            }

            // Validate each sponsor entry
            const errors = []
            for (let i = 0; i < sponsors.length; i++) {
              const s = sponsors[i]
              if (!s.name || typeof s.name !== 'string') {
                errors.push(`第 ${i + 1} 项：name 必填且为字符串`)
              }
              if (!s.avatar || typeof s.avatar !== 'string') {
                errors.push(`第 ${i + 1} 项：avatar 必填且为字符串`)
              }
              if (!s.amount || typeof s.amount !== 'string') {
                errors.push(`第 ${i + 1} 项：amount 必填且为字符串`)
              }
              if (!s.date || typeof s.date !== 'string') {
                errors.push(`第 ${i + 1} 项：date 必填且为字符串`)
              }
            }

            if (errors.length) {
              await createComment([MSG.VALIDATE_FAIL, '', ...errors.map((x) => `- ${x}`)].join('\n'))
              return
            }

            // Check avatar reachability for all sponsors
            const avatarChecks = []
            for (const sponsor of sponsors) {
              if (sponsor.avatar) {
                const check = await checkAvatarReachability(sponsor.avatar)
                avatarChecks.push({ name: sponsor.name, url: sponsor.avatar, ...check })
              }
            }

            const allAvatarsOk = avatarChecks.every((c) => c.ok)

            // Update labels
            const addLabels = []
            const removeLabels = [LABEL_AVATAR_OK, LABEL_AVATAR_BAD, LABEL_ALL_OK]

            if (allAvatarsOk) {
              addLabels.push(LABEL_AVATAR_OK, LABEL_ALL_OK)
            } else {
              addLabels.push(LABEL_AVATAR_BAD)
              const failed = avatarChecks.filter((c) => !c.ok)
              await createComment(
                [
                  MSG.AVATAR_UNREACHABLE,
                  '',
                  ...failed.map((f) => `- ${f.name}: ${f.url} (${f.error || `HTTP ${f.status}`})`),
                ].join('\n')
              )
              return
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: addLabels })
            for (const name of removeLabels) {
              if (!addLabels.includes(name)) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name })
                } catch (e) {
                  if (e.status !== 404) throw e
                }
              }
            }

            // Auto merge if all checks pass
            if (allAvatarsOk) {
              try {
                await github.rest.pulls.merge({ owner, repo, pull_number, merge_method: 'squash' })
                await createComment(MSG.MERGE_SUCCESS)
              } catch (e) {
                await createComment(`${MSG.MERGE_FAIL}${e?.message || e}`)
              }
            }

  verify_and_merge:
    if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.body == '准备完毕' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Re-verify and merge sponsor PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.PAT }}
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const pull_number = context.payload.issue.number

            const LABEL_SPONSOR = '赞助'
            const LABEL_AVATAR_OK = '头像可达'
            const LABEL_AVATAR_BAD = '头像不可达'
            const LABEL_ALL_OK = '验证通过'

            const MSG = {
              NOT_SPONSOR: '该 PR 不是赞助 PR，跳过处理。',
              PR_NOT_FOUND: '无法获取 PR 信息。',
              AVATAR_UNREACHABLE: '头像链接不可达，请修复后再次回复"准备完毕"。',
              MERGE_SUCCESS: '✅ 赞助信息已自动合并，感谢你的支持！',
              MERGE_FAIL: '❌ 自动合并失败：',
            }

            async function createComment(body) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              const footer = `\n\n---\n该评论由 Action 自动化发送，无需回复。\n\n🔗 [查看 Action](${runUrl})`
              const fullBody = body + footer
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body: fullBody })
            }

            async function getTextFileFromRepo(path, ref) {
              const res = await github.rest.repos.getContent({ owner, repo, path, ref })
              if (Array.isArray(res.data) || !res.data?.content) throw new Error(`Invalid content response for ${path}`)
              const raw = Buffer.from(res.data.content, res.data.encoding || 'base64').toString('utf8')
              return raw
            }

            async function checkAvatarReachability(url) {
              const controller = new AbortController()
              const timer = setTimeout(() => controller.abort(), 10000)
              try {
                try {
                  const u = new URL(url)
                  if (u.protocol !== 'http:' && u.protocol !== 'https:') throw new Error('Invalid protocol')
                  const h = u.hostname
                  if (h === 'localhost' || h === '127.0.0.1' || h === '::1') throw new Error('Localhost not allowed')
                  if (/^10\./.test(h)) throw new Error('Private IP not allowed')
                  if (/^192\.168\./.test(h)) throw new Error('Private IP not allowed')
                  if (/^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(h)) throw new Error('Private IP not allowed')
                } catch (e) {
                  return { ok: false, error: e.message }
                }

                const res = await fetch(url, {
                  method: 'HEAD',
                  redirect: 'follow',
                  headers: {
                    'user-agent': 'yxk-blog-sponsor/1.0 (+github actions)',
                    accept: 'image/*,*/*;q=0.8',
                  },
                  signal: controller.signal,
                })
                return { ok: res.status >= 200 && res.status < 400, status: res.status }
              } catch (e) {
                return { ok: false, error: e?.message || String(e) }
              } finally {
                clearTimeout(timer)
              }
            }

            // Get PR info
            const pr = await github.rest.pulls.get({ owner, repo, pull_number })
            if (!pr.data) {
              await createComment(MSG.PR_NOT_FOUND)
              return
            }

            // Check if it's a sponsor PR
            const prLabels = new Set((pr.data.labels || []).map((l) => l.name))
            if (!prLabels.has(LABEL_SPONSOR)) {
              await createComment(MSG.NOT_SPONSOR)
              return
            }

            // Get sponsors.json
            let sponsors
            try {
              const raw = await getTextFileFromRepo('src/data/sponsors.json', pr.data.head.sha)
              sponsors = JSON.parse(raw)
            } catch (e) {
              await createComment(`无法读取或解析 sponsors.json：${e.message}`)
              return
            }

            if (!Array.isArray(sponsors)) {
              await createComment('sponsors.json 必须是一个数组')
              return
            }

            // Re-check avatar reachability
            const avatarChecks = []
            for (const sponsor of sponsors) {
              if (sponsor.avatar) {
                const check = await checkAvatarReachability(sponsor.avatar)
                avatarChecks.push({ name: sponsor.name, url: sponsor.avatar, ...check })
              }
            }

            const allAvatarsOk = avatarChecks.every((c) => c.ok)

            if (!allAvatarsOk) {
              const failed = avatarChecks.filter((c) => !c.ok)
              await createComment(
                [
                  MSG.AVATAR_UNREACHABLE,
                  '',
                  ...failed.map((f) => `- ${f.name}: ${f.url} (${f.error || `HTTP ${f.status}`})`),
                ].join('\n')
              )
              return
            }

            // Update labels
            await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: [LABEL_AVATAR_OK, LABEL_ALL_OK] })
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: LABEL_AVATAR_BAD })
            } catch (e) {
              if (e.status !== 404) throw e
            }

            // Merge PR
            try {
              await github.rest.pulls.merge({ owner, repo, pull_number, merge_method: 'squash' })
              await createComment(MSG.MERGE_SUCCESS)
            } catch (e) {
              await createComment(`${MSG.MERGE_FAIL}${e?.message || e}`)
            }
